<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image with JavaScript</title>
</head>
<body>
    <img src="JAVASCRIPT-2\11.png" alt="Image is missing" title="This image is loaded using JavaScript" width="100px" height="500px"/>
</body>
<script>

    let img=document.querySelector("img");
    img.setAttribute("src","JAVASCRIPT-2/11.png");
    img.setAttribute("title","First image loaded using JavaScript");
</script>
</html>
